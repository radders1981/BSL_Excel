<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BSL Excel</title>
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="stylesheet" href="taskpane.css" />
</head>
<body>
  <h1>BSL Excel</h1>

  <!-- Server connection -->
  <div class="section">
    <div class="section-label">Server URL</div>
    <div class="server-row">
      <input type="text" id="serverUrl" placeholder="http://localhost:8000" />
      <button class="btn-secondary" id="connectBtn">Connect</button>
    </div>
  </div>

  <!-- Query builder (hidden until connected) -->
  <div id="querySection" class="hidden">
    <div class="section">
      <div class="section-label">Model</div>
      <select id="modelSelect">
        <option value="">-- select a model --</option>
      </select>
    </div>

    <!-- Fields (hidden until model selected) -->
    <div id="fieldSection" class="hidden">
      <div class="section">
        <div class="section-header">
          <span class="section-label">Dimensions</span>
          <span class="all-none-links">
            <a href="#" id="dimAllBtn">All</a> / <a href="#" id="dimNoneBtn">None</a>
          </span>
        </div>
        <div class="field-panels">
          <div class="field-panel">
            <div class="panel-label">Available</div>
            <div class="checkbox-list" id="dimensionList"></div>
          </div>
          <div class="field-panel">
            <div class="panel-label">Selected</div>
            <div class="selected-list" id="dimensionSelected"></div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-header">
          <span class="section-label">Measures</span>
          <span class="all-none-links">
            <a href="#" id="measAllBtn">All</a> / <a href="#" id="measNoneBtn">None</a>
          </span>
        </div>
        <div class="field-panels">
          <div class="field-panel">
            <div class="panel-label">Available</div>
            <div class="checkbox-list" id="measureList"></div>
          </div>
          <div class="field-panel">
            <div class="panel-label">Selected</div>
            <div class="selected-list" id="measureSelected"></div>
          </div>
        </div>
      </div>

      <div class="section">
        <div class="section-label">Filters</div>
        <div id="filterList"></div>
        <button class="btn-add-filter" id="addFilterBtn" type="button">+ Add Filter</button>
      </div>

      <div class="section">
        <div class="section-label">Sort</div>
        <div id="sortList"></div>
        <button class="btn-add-filter" id="addSortBtn" type="button">+ Add Sort</button>
      </div>

      <div class="section">
        <div class="section-label">Row limit</div>
        <div class="limit-row">
          <input type="number" id="limitInput" value="1000" min="1" max="100000" />
          <span style="color:#616161;">rows max</span>
        </div>
      </div>

      <button class="btn-primary" id="runBtn">Run Query &#8594; Sheet</button>
    </div>
  </div>

  <div id="status" class="idle">Enter your server URL and click Connect.</div>

  <script src="taskpane.js"></script>
</body>
</html>
